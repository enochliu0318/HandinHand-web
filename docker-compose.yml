services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: handinhand
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: handinhand
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U handinhand -d handinhand"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://handinhand:${POSTGRES_PASSWORD}@db:5432/handinhand
      NODE_ENV: production
      RUN_SEED: ${RUN_SEED:-false}
    volumes:
      - uploads:/app/public/uploads
    ports:
      - "${APP_PORT:-3000}:3000"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app

volumes:
  postgres_data:
  uploads:
